{% extends 'base.html' %}
{% block content %}
<h1>Cambiar contraseña</h1>

<form method="post">
  {{ form.hidden_tag() }}

  <label>{{ form.password.label }}</label>
  {{ form.password() }}
  {% for error in form.password.errors %}
    <div class="flash danger">{{ error }}</div>
  {% endfor %}

  {{ form.submit(class_='btn') }}
</form>
{% endblock %}
