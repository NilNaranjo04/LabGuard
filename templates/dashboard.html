{% extends 'base.html' %}
{% block content %}
<h1>Panel de Control</h1>

<div class="grid">
  <div class="card">
    <h3>Usuarios</h3>
    <p style="font-size:28px;margin:0;">{{ stats.users }}</p>
  </div>
  <div class="card">
    <h3>Equipos</h3>
    <p style="font-size:28px;margin:0;">{{ stats.equipment }}</p>
  </div>
  <div class="card">
    <h3>Préstamos abiertos</h3>
    <p style="font-size:28px;margin:0;">{{ stats.loans_open }}</p>
  </div>
  <div class="card">
    <h3>Incidencias abiertas</h3>
    <p style="font-size:28px;margin:0;">{{ stats.incidents_open }}</p>
  </div>
</div>
{% endblock %}
