{% extends 'base.html' %}
{% block content %}
<h1>Auditoría</h1>
<table>
  <tr><th>Fecha</th><th>Actor</th><th>Acción</th><th>Detalles</th><th>IP</th></tr>
  {% for log in logs %}
    <tr>
      <td>{{ log.created_at }}</td>
      <td>{{ log.actor_email }}</td>
      <td>{{ log.action }}</td>
      <td>{{ log.details }}</td>
      <td>{{ log.ip_address }}</td>
    </tr>
  {% endfor %}
</table>
{% endblock %}
