services:
  app:
    build: .
    container_name: labguard_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./instance:/app/instance
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs
    depends_on:
      - app
