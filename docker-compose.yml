services:
  app:
    build: .
    container_name: labguard_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./instance:/app/instance
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: labguard_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
