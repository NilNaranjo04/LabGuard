server {
    listen 80;
    server_name labguard.es www.labguard.es;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name labguard.es www.labguard.es;

    ssl_certificate /etc/nginx/certs/labguard.crt;
    ssl_certificate_key /etc/nginx/certs/labguard.key;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
