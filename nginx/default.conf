limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server_tokens off;

server {
    listen 80;
    server_name labguard.es www.labguard.es;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name labguard.es www.labguard.es;

    ssl_certificate /etc/nginx/certs/labguard.crt;
    ssl_certificate_key /etc/nginx/certs/labguard.key;

    client_max_body_size 2M;

    access_log /etc/nginx/conf.d/logs/access.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; form-action 'self'; frame-ancestors 'self'; base-uri 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    error_page 404 500 502 503 504 /maintenance.html;

    location = /maintenance.html {
        alias /etc/nginx/maintenance/maintenance.html;
        internal;
    }

    location = /login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_intercept_errors on;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        proxy_intercept_errors on;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
